NODE="$(dirname "$0")/node"
NPX="$(dirname "$0")/../lib/node_modules/npm/bin/npx-cli.js"
exec "$NODE" "$NPX" "$@"
NPXEOF
          chmod +x ../output/bin/npm ../output/bin/npx ../output/bin/node
          
