name: Build Node.js for Android

on:
  workflow_dispatch:

jobs:

  build-arm64:
    runs-on: ubuntu-22.04
    steps:

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential python3 python3-pip \
            wget unzip zip git

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip -d $HOME
          echo "NDK=$HOME/android-ndk-r25c" >> $GITHUB_ENV

      - name: Download Node.js Source
        run: |
          wget -q https://nodejs.org/dist/v20.11.0/node-v20.11.0.tar.gz
          tar -xzf node-v20.11.0.tar.gz

      - name: Build ARM64
        run: |
          cd node-v20.11.0
          
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          export CC="$TOOLCHAIN/aarch64-linux-android21-clang"
          export CXX="$TOOLCHAIN/aarch64-linux-android21-clang++"
          export AR="$TOOLCHAIN/llvm-ar"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export LINK="$CXX"
          
          # Correct way — GYP_DEFINES mein set karo
          export GYP_DEFINES="android_ndk_path=$NDK"
          
          # --android-ndk-path flag bilkul mat dena
          python3 configure.py \
            --dest-cpu=arm64 \
            --dest-os=android \
            --cross-compiling \
            --without-intl \
            --without-inspector \
            --without-node-snapshot \
            --without-node-code-cache
          
          make -j$(nproc)
          
          mkdir -p ../output/bin
          mkdir -p ../output/lib/node_modules
          
          cp out/Release/node ../output/bin/node
          cp -r deps/npm ../output/lib/node_modules/npm 2>/dev/null || true
          
          cat > ../output/bin/npm << 'NPMEOF'
#!/system/bin/sh
NODE="$(dirname "$0")/node"
NPM="$(dirname "$0")/../lib/node_modules/npm/bin/npm-cli.js"
exec "$NODE" "$NPM" "$@"
NPMEOF
          
          cat > ../output/bin/npx << 'NPXEOF'
#!/system/bin/sh
NODE="$(dirname "$0")/node"
NPX="$(dirname "$0")/../lib/node_modules/npm/bin/npx-cli.js"
exec "$NODE" "$NPX" "$@"
NPXEOF
          
          chmod +x ../output/bin/npm
          chmod +x ../output/bin/npx
          chmod +x ../output/bin/node
          
          cd ..
          zip -r node-v20-android-arm64.zip output/

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v20.11.0
          name: Node.js v20 Android Binaries
          files: node-v20-android-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-arm:
