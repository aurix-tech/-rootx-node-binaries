name: Build Node.js for Android

on:
  workflow_dispatch:

jobs:

  build-arm64:
    runs-on: ubuntu-22.04
    steps:

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            python3-pip \
            wget unzip zip

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip -d $HOME
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r25c" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-ndk-r25c" >> $GITHUB_ENV
          echo "ANDROID_NDK=$HOME/android-ndk-r25c" >> $GITHUB_ENV

      - name: Download Node.js Source
        run: |
          wget -q https://nodejs.org/dist/v20.11.0/node-v20.11.0.tar.gz
          tar -xzf node-v20.11.0.tar.gz

      - name: Build ARM64
        run: |
          cd node-v20.11.0
          
          TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          export CC="$TOOLCHAIN/aarch64-linux-android21-clang"
          export CXX="$TOOLCHAIN/aarch64-linux-android21-clang++"
          export AR="$TOOLCHAIN/llvm-ar"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export LINK="$CXX"
          
          # GYP ko NDK path manually dena
          export GYP_DEFINES="android_ndk_path=$ANDROID_NDK_ROOT"
          
          python3 configure.py \
            --dest-cpu=arm64 \
            --dest-os=android \
            --cross-compiling \
            --without-intl \
            --without-inspector \
            --without-node-snapshot \
            --without-node-code-cache \
            --android-ndk-path=$ANDROID_NDK_ROOT
          
          make -j$(nproc) 2>&1 | tail -50
          
          mkdir -p ../output/bin
          mkdir -p ../output/lib
          
          cp out/Release/node ../output/bin/node
          cp -r lib ../output/ 2>/dev/null || true
          cp -r deps/npm ../output/lib/node_modules/ 2>/dev/null || true
          
          # npm script
          cat > ../output/bin/npm << 'EOF'
          #!/system/bin/sh
          exec "$(dirname "$0")/node" "$(dirname "$0")/../lib/node_modules/npm/bin/npm-cli.js" "$@"
          EOF
          
          # npx script
          cat > ../output/bin/npx << 'EOF'
          #!/system/bin/sh
          exec "$(dirname "$0")/node" "$(dirname "$0")/../lib/node_modules/npm/bin/npx-cli.js" "$@"
          EOF
          
          chmod +x ../output/bin/npm
          chmod +x ../output/bin/npx
          
          cd ..
          zip -r node-v20-android-arm64.zip output/

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v20.11.0
          name: Node.js v20 Android Binaries
          files: node-v20-android-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

